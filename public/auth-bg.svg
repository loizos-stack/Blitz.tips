<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <radialGradient id="aGlowTop" cx="20%" cy="12%" r="42%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aGlowBottom" cx="85%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#16a34a" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="1024" fill="url(#aGlowTop)"/>
  <rect width="1440" height="1024" fill="url(#aGlowBottom)"/>

  <!-- faint chart gridlines -->
  <g stroke="#13161c" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="200" x2="1440" y2="200"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="800" x2="1440" y2="800"/>
  </g>
  <g stroke="#13161c" stroke-opacity="0.025" stroke-width="1">
    <line x1="360" y1="0" x2="360" y2="1024"/>
    <line x1="720" y1="0" x2="720" y2="1024"/>
    <line x1="1080" y1="0" x2="1080" y2="1024"/>
  </g>

  <!-- rising units curve across the lower third, with area fill -->
  <path d="M0 880 L200 865 L400 875 L620 815 L820 835 L1040 755 L1240 775 L1440 690 L1440 1024 L0 1024 Z"
        fill="url(#aArea)"/>
  <path d="M0 880 L200 865 L400 875 L620 815 L820 835 L1040 755 L1240 775 L1440 690"
        stroke="url(#aLine)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#16a34a">
    <circle cx="620" cy="815" r="3.5" fill-opacity="0.35"/>
    <circle cx="1040" cy="755" r="4" fill-opacity="0.5"/>
    <circle cx="1440" cy="690" r="4.5" fill-opacity="0.6"/>
  </g>

  <!-- dotted ball-trajectory arcs, top corners -->
  <g stroke="#16a34a" fill="none" stroke-linecap="round">
    <path d="M120 300 Q320 120 560 250" stroke-opacity="0.14" stroke-width="2" stroke-dasharray="0.1 12"/>
    <path d="M980 200 Q1160 60 1360 170" stroke-opacity="0.16" stroke-width="2" stroke-dasharray="0.1 12"/>
  </g>

  <!-- faint odds glyphs scattered wide of center -->
  <g fill="#13161c" fill-opacity="0.045" font-family="ui-monospace, monospace" font-size="14" font-weight="600">
    <text x="140" y="520">+145</text>
    <text x="1230" y="470">-110</text>
    <text x="220" y="760">O 47.5</text>
    <text x="1180" y="820">+128</text>
  </g>
</svg>
