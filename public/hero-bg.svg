<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" preserveAspectRatio="xMidYMax slice" fill="none">
  <defs>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#16a34a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow upper right -->
  <rect width="1440" height="640" fill="url(#glow)"/>

  <!-- faint horizontal gridlines, like a stats chart -->
  <g stroke="#13161c" stroke-opacity="0.045" stroke-width="1">
    <line x1="0" y1="140" x2="1440" y2="140"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="340" x2="1440" y2="340"/>
    <line x1="0" y1="440" x2="1440" y2="440"/>
    <line x1="0" y1="540" x2="1440" y2="540"/>
  </g>

  <!-- faint vertical ticks -->
  <g stroke="#13161c" stroke-opacity="0.03" stroke-width="1">
    <line x1="240" y1="0" x2="240" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- secondary muted line (a losing capper, drifting down) -->
  <path d="M0 320 L160 335 L320 315 L480 360 L640 350 L800 395 L960 385 L1120 430 L1280 425 L1440 465"
        stroke="#626b7a" stroke-opacity="0.18" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
        stroke-dasharray="1 7"/>

  <!-- main rising units curve with area fill -->
  <path d="M0 520 L160 505 L320 515 L480 460 L640 475 L800 400 L960 415 L1120 330 L1280 345 L1440 250 L1440 640 L0 640 Z"
        fill="url(#areaFill)"/>
  <path d="M0 520 L160 505 L320 515 L480 460 L640 475 L800 400 L960 415 L1120 330 L1280 345 L1440 250"
        stroke="url(#lineStroke)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- data points on the winning line -->
  <g fill="#16a34a">
    <circle cx="480" cy="460" r="3.5" fill-opacity="0.35"/>
    <circle cx="800" cy="400" r="3.5" fill-opacity="0.45"/>
    <circle cx="1120" cy="330" r="4" fill-opacity="0.55"/>
    <circle cx="1280" cy="345" r="3.5" fill-opacity="0.5"/>
    <circle cx="1440" cy="250" r="4.5" fill-opacity="0.65"/>
  </g>

  <!-- dotted ball-trajectory arcs, upper right -->
  <g stroke="#16a34a" fill="none" stroke-linecap="round">
    <path d="M900 210 Q1080 40 1300 150" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="0.1 12"/>
    <path d="M1010 260 Q1160 130 1380 200" stroke-opacity="0.14" stroke-width="2" stroke-dasharray="0.1 12"/>
  </g>
  <circle cx="1300" cy="150" r="5" fill="#16a34a" fill-opacity="0.30"/>
  <circle cx="1380" cy="200" r="4" fill="#16a34a" fill-opacity="0.18"/>

  <!-- tiny plus/minus odds glyphs, very faint, scattered right side -->
  <g fill="#13161c" fill-opacity="0.05" font-family="ui-monospace, monospace" font-size="13" font-weight="600">
    <text x="1035" y="330">+128</text>
    <text x="1215" y="270">-110</text>
    <text x="900" y="430">+145</text>
    <text x="1330" y="390">-135</text>
  </g>
</svg>
