<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <radialGradient id="glowL" cx="8%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="95%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="480" fill="url(#glowL)"/>
  <rect width="1440" height="480" fill="url(#glowR)"/>

  <!-- faint scoreboard-style horizontal ticks -->
  <g stroke="#13161c" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="1440" y2="80"/>
    <line x1="0" y1="160" x2="1440" y2="160"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="320" x2="1440" y2="320"/>
    <line x1="0" y1="400" x2="1440" y2="400"/>
  </g>

  <!-- large faint ring, like a stadium spotlight / scoreboard clock -->
  <circle cx="1250" cy="90" r="150" stroke="#16a34a" stroke-opacity="0.07" stroke-width="1.5" fill="none"/>
  <circle cx="1250" cy="90" r="110" stroke="#16a34a" stroke-opacity="0.05" stroke-width="1" fill="none"/>

  <!-- dotted trajectory arcs, echoing the hero -->
  <g stroke="#16a34a" fill="none" stroke-linecap="round">
    <path d="M60 420 Q260 300 500 360" stroke-opacity="0.10" stroke-width="2" stroke-dasharray="0.1 12"/>
    <path d="M-40 350 Q160 260 380 300" stroke-opacity="0.06" stroke-width="2" stroke-dasharray="0.1 12"/>
  </g>

  <!-- faint odds glyphs -->
  <g fill="#13161c" fill-opacity="0.045" font-family="ui-monospace, monospace" font-size="14" font-weight="600">
    <text x="80" y="130">-110</text>
    <text x="1100" y="220">+145</text>
    <text x="200" y="440">O 47.5</text>
    <text x="950" y="400">+128</text>
  </g>
</svg>
